version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: properti_indahweb_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: properti_indahweb
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: properti_indahweb_express
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql://root:password@db:3306/properti_indahweb
      - SESSION_SECRET=properti_indahweb_session_secret_key_123456
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - uploads_data:/usr/src/app/public/uploads

volumes:
  mysql_data:
  uploads_data:
