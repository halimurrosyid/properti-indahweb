version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: 1rumah_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: 1rumah_express
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/postgres
      - SESSION_SECRET=1rumah_session_secret_key_123456
      - NODE_ENV=production
      - PORT=3000
      - SITE_URL=${SITE_URL:-https://1rumah.biz.id}
      - TZ=Asia/Jakarta
      - UPLOAD_DIR=/data/uploads
      - UPLOAD_MAX_SIZE_MB=${UPLOAD_MAX_SIZE_MB:-1}
      - UPLOAD_RAW_MAX_SIZE_MB=${UPLOAD_RAW_MAX_SIZE_MB:-8}
      - IMAGE_MAX_WIDTH=${IMAGE_MAX_WIDTH:-1920}
      - RUN_BACKGROUND_JOBS=true
      - AI_BLOG_SCHEDULED_PIPELINE_LIMIT=5
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SUPER_ADMIN_EMAIL=admin@1rumah.biz.id
      - SUPER_ADMIN_PASSWORD=adminindahweb
      - SUPER_ADMIN_NAME=Super Admin 1rumah.biz.id
      - SUPER_ADMIN_WHATSAPP=628123456789
    volumes:
      - uploads_data:/data/uploads

volumes:
  postgres_data:
  uploads_data:
