version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: properti_indahweb_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: properti_indahweb_express
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/postgres
      - SESSION_SECRET=properti_indahweb_session_secret_key_123456
      - NODE_ENV=production
      - PORT=3000
      - SITE_URL=${SITE_URL:-https://properti.indahweb.com}
      - TZ=Asia/Jakarta
      - UPLOAD_DIR=/data/uploads
      - RUN_BACKGROUND_JOBS=true
      - AI_BLOG_SCHEDULED_PIPELINE_LIMIT=5
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SUPER_ADMIN_EMAIL=admin@properti.indahweb.com
      - SUPER_ADMIN_PASSWORD=adminindahweb
      - SUPER_ADMIN_NAME=Super Admin Indahweb
      - SUPER_ADMIN_WHATSAPP=628123456789
    volumes:
      - uploads_data:/data/uploads

volumes:
  postgres_data:
  uploads_data:
